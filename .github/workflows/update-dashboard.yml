name: Update dashboard

on:
  schedule:
    # The scraper now runs its per-user requests concurrently over a pooled
    # session, so a full scrape of all poules (50+ unique participants)
    # takes minutes, not the 1.5 hours that forced the old 2-hour cadence.
    # Offset from the exact quarter mark per GitHub's own congestion
    # guidance (everyone's cron jobs fire right on :00/:15/:30/:45, so a
    # few minutes off avoids most of that backlog).
    - cron: "6,21,36,51 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

# Runs are fast now, but keep the queue anyway: if a run ever stalls, a new
# scheduled trigger could start before it finishes and both would try to
# commit/push at once (the second push gets rejected as non-fast-forward).
# cancel-in-progress stays false so a scrape already underway is never
# killed mid-way by the next tick.
concurrency:
  group: update-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest Scorito data
        env:
          SCORITO_BEARER_TOKEN: ${{ secrets.SCORITO_BEARER_TOKEN }}
          SCORITO_MARKET_ID: ${{ secrets.SCORITO_MARKET_ID }}
          SCORITO_EVENT_ID: ${{ secrets.SCORITO_EVENT_ID }}
        run: python scorito_scraper.py

      - name: Rebuild dashboard.html
        run: python build_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to dashboard.html -- skipping commit."
          else
            git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
