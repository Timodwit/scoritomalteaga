name: Update dashboard

on:
  schedule:
    # The scraper now runs its per-user requests concurrently over a pooled
    # session, so a full scrape of all poules (50+ unique participants)
    # takes minutes, not the 1.5 hours that forced the old 2-hour cadence.
    # Offset from the exact quarter mark per GitHub's own congestion
    # guidance (everyone's cron jobs fire right on :00/:15/:30/:45, so a
    # few minutes off avoids most of that backlog).
    - cron: "6,21,36,51 * * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

# Runs are fast now, but keep the queue anyway: if a run ever stalls, a new
# scheduled trigger could start before it finishes and both would try to
# commit/push at once (the second push gets rejected as non-fast-forward).
# cancel-in-progress stays false so a scrape already underway is never
# killed mid-way by the next tick.
concurrency:
  group: update-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    # Full scrape + build is ~3 minutes; the live loop below adds at most
    # LIVE_LOOP_MINUTES on top. Kill anything beyond that as hung.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest Scorito data
        env:
          SCORITO_BEARER_TOKEN: ${{ secrets.SCORITO_BEARER_TOKEN }}
          SCORITO_MARKET_ID: ${{ secrets.SCORITO_MARKET_ID }}
          SCORITO_EVENT_ID: ${{ secrets.SCORITO_EVENT_ID }}
        run: python scorito_scraper.py

      - name: Rebuild dashboard-data.json
        run: python build_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-data.json
          if git diff --cached --quiet; then
            echo "No changes to dashboard-data.json -- skipping commit."
          else
            git commit -m "Auto-update dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Live-update while matches are in progress
        env:
          SCORITO_BEARER_TOKEN: ${{ secrets.SCORITO_BEARER_TOKEN }}
          SCORITO_MARKET_ID: ${{ secrets.SCORITO_MARKET_ID }}
          SCORITO_EVENT_ID: ${{ secrets.SCORITO_EVENT_ID }}
        run: |
          # While a match is in progress (kickoff passed, Scorito hasn't
          # marked it finished), refresh just the live rounds' scores/goals
          # every ~75s -- a handful of requests, not a full scrape -- and
          # commit only when the dashboard data actually changed. Goals are
          # rare, and dashboard-data.json commits are ignored by Netlify's
          # build (see netlify.toml), so this loop no longer costs any
          # Netlify deploys at all -- the live page just re-fetches the
          # data file straight from GitHub.
          #
          # --live-count reads the data files the previous step just wrote,
          # so the common no-live-match case exits here without any network
          # traffic. The loop hands over after LIVE_LOOP_MINUTES: the every-
          # 15-min schedule plus the concurrency queue means a fresh run is
          # normally already waiting to take its place.
          LIVE_LOOP_MINUTES=25
          deadline=$(( $(date +%s) + LIVE_LOOP_MINUTES * 60 ))
          while [ "$(python scorito_scraper.py --live-count)" != "0" ]; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "Live loop reached ${LIVE_LOOP_MINUTES}m -- handing over to the next scheduled run."
              break
            fi
            sleep 75
            python scorito_scraper.py --live > /dev/null
            python build_dashboard.py
            git add dashboard-data.json
            if git diff --cached --quiet; then
              echo "$(date -u +'%H:%M:%S') no dashboard change"
            else
              git commit -m "Live update $(date -u +'%Y-%m-%d %H:%M UTC')"
              git push
            fi
          done
