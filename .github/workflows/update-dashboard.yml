name: Update dashboard

on:
  schedule:
    # A full scrape now covers every unique participant across all poules in
    # pools.json (50+ people as of the multi-poule rollout) instead of just
    # one poule's ~10, so a run takes over an hour instead of ~10 minutes.
    # Every 15 minutes would just queue up runs faster than they finish, so
    # this now fires every 2 hours -- still offset from the exact hour mark
    # per GitHub's own congestion guidance (everyone's cron jobs fire right
    # on :00, so a few minutes off avoids most of that backlog).
    - cron: "6 */2 * * *"
  workflow_dispatch: {} # lets you trigger a run manually from the Actions tab

# A run can now take well over an hour, so without this a new scheduled
# trigger could start before the previous run finishes and both would try
# to commit/push at once (the second push gets rejected as non-fast-forward).
# Queue instead of running in parallel -- cancel-in-progress stays false so
# a long scrape already underway is never killed mid-way by the next tick.
concurrency:
  group: update-dashboard
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest Scorito data
        env:
          SCORITO_BEARER_TOKEN: ${{ secrets.SCORITO_BEARER_TOKEN }}
          SCORITO_MARKET_ID: ${{ secrets.SCORITO_MARKET_ID }}
          SCORITO_EVENT_ID: ${{ secrets.SCORITO_EVENT_ID }}
        run: python scorito_scraper.py

      - name: Rebuild dashboard.html
        run: python build_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          if git diff --cached --quiet; then
            echo "No changes to dashboard.html -- skipping commit."
          else
            git commit -m "Auto-update dashboard $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
